# MQTT Broker Configuration for PetCare

# -- Listeners ----------------------------------------------
# MQTT protocol (default port 1883)
listener 1883 0.0.0.0
# WebSocket protocol (default port 9001, for browser clients)
listener 9001 0.0.0.0
protocol websockets

# -- Persistence --------------------------------------------
# Enable persistent message storage
persistence true
persistence_location /mosquitto/data/

# -- Logging ------------------------------------------------
log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# -- Security (CRITICAL) ------------------------------------
# DISABLE anonymous access (requires authentication)
# All devices must provide username/password
allow_anonymous true

# Enable password-based authentication
# Password file must be generated with: mosquitto_passwd -c passwd device_id
# # password_file /mosquitto/config/passwd
# password_file /mosquitto/config/passwd

# Use ACL file staged into a writable container path at startup
acl_file /tmp/mosquitto/acl.conf

# Password file staged the same way when present
# password_file /tmp/mosquitto/passwd

# -- Performance --------------------------------------------
max_connections -1              # Unlimited connections
max_queued_messages 1000        # Per-client message queue

# -- LWT (Last Will Testament) ------------------------------
# Enabled per-client in device firmware via MQTT client config

# -- Notes ---------------------------------------------------
# Device authentication credentials:
# - Client ID: MongoDB ObjectId (24 hex characters)
# - Username: device_{device_id}
# - Password: 32-char hex device_key
#
# Example:
#   Client ID: 507f1f77bcf86cd799439011
#   Username: device_507f1f77bcf86cd799439011
#   Password: f47ac10b58cc4372a5670e4dn4c33659
#
# Generate password file:
#   mosquitto_passwd -c /mosquitto/config/passwd device_507f1f77bcf86cd799439011
#   (then enter device_key as password when prompted)
