# infra/mosquitto/acl.conf
# Each device authenticates as username: device_{deviceId}
# and can ONLY publish/subscribe to its own topics

# Pattern ACL - %u is replaced with the connecting username
# username format: device_507f1f77bcf86cd799439011

# Devices publish and subscribe to topics rooted at their MQTT client ID.
# The firmware now uses the paired ObjectId as the client ID after pairing,
# and falls back to the serial before pairing.
pattern readwrite device/%c/#
pattern readwrite devices/%c/#

# Allow the device username to authenticate, while topic access is governed by %c.
# Example username: device_69fbfcb2e803a710eb1360fb

# Optional debug listener access for anonymous local subscribers.
# Keep read-only and broad so diagnostics can observe the live topic tree.
topic read device/69fbfcb2e803a710eb1360fb/#
topic read devices/69fbfcb2e803a710eb1360fb/#

# Internal services use a shared service account (more permissive)
# username: petcare-service or backend_service
user petcare-service
topic readwrite #

user backend_service
topic readwrite #